name: Build and Deploy to Prod ECS

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.SIAL_BHAI_ACC_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.SIAL_BHAI_ACC_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.SIAL_BHAI_ACC_AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, Tag, and Push Image to ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: sdk-cdk-import-ecr
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # 1. Build and Tag
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          
          # 2. Push to ECR
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          
          # 3. Output image URI for next steps
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Download Task Definition
        run: |
          # ✅ CORRECTED: Naya Service Name jo aapki screenshot mein hai
          SERVICE_NAME="sdk-cdk-task-import-service-lu412qoq"
          CLUSTER_NAME="sdk-cdk-git-first-cluster"

          # 1. Latest Task ARN retrieve karein
          TASK_DEF_ARN=$(aws ecs describe-services --cluster $CLUSTER_NAME --services $SERVICE_NAME --query "services[0].taskDefinition" --output text)
          
          # 2. Check karein ke ARN mila ya nahi (Security Check)
          if [ "$TASK_DEF_ARN" == "None" ] || [ -z "$TASK_DEF_ARN" ]; then
            echo "❌ Error: AWS se Task Definition ARN nahi mil saka. Check karein ke service name sahi hai."
            exit 1
          fi

          # 3. JSON download karein aur saare fuzool fields delete karein (jq use karke)
          aws ecs describe-task-definition --task-definition $TASK_DEF_ARN --query taskDefinition | \
          jq 'del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy, .enableFaultInjection)' > task-definition.json
          
          # 4. Debug: Check karein ke file khali to nahi?
          if [ ! -s task-definition.json ]; then
            echo "❌ Error: task-definition.json file khali hai!"
            exit 1
          fi

      - name: Fill in the new image ID in the Amazon ECS task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: prod-container
          image: ${{ steps.build-image.outputs.image }}

      - name: Deploy Amazon ECS task definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: sdk-cdk-task-import-service-lu412qoq
          cluster: sdk-cdk-git-first-cluster
          wait-for-service-stability: true
